<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kartini Day</title>

    <link
      href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Sniglet:wght@400;800&display=swap"
      rel="stylesheet"
    />

    <style>
      /* ============================================================
           1. VARIABEL & RESET
           ============================================================ */
      :root {
        --bg-pink: #ffc9d7;
        --easy-color: #ff85a2; /* Tetap Pink */
        --hard-color: #b2dfdb; /* Soft Teal */
        --medium-color: #e1bee7; /* Periwinkle Blue */
        --text-brown: #8b5a2b;
      }

      body {
        margin: 0;
        padding: 0;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        background: var(--bg-pink);
        font-family: "Sniglet", cursive;
        overflow: hidden;
        background-image: radial-gradient(
          rgba(255, 255, 255, 0.3) 2px,
          transparent 2px
        );
        background-size: 30px 30px;
      }

      /* ============================================================
           2. LAYOUT UTAMA
           ============================================================ */
      .landing-container {
        text-align: center;
        z-index: 10;
        padding: 20px;
      }

      .header-section {
        margin-bottom: 40px;
      }

      .main-title {
        font-family: "Fredoka One", cursive;
        font-size: 4.5rem;
        color: var(--text-brown);
        text-shadow: 4px 6px 0px white;
        margin: 0;
        animation:
          bounceIn 1s ease-out,
          float 3s ease-in-out infinite;
      }

      .sub-title {
        font-size: 1.6rem;
        color: #a64452;
        margin-top: 10px;
        font-weight: bold;
      }

      /* ============================================================
           3. TOMBOL LEVEL
           ============================================================ */
      .button-group {
        display: flex;
        gap: 25px;
        justify-content: center;
        flex-wrap: wrap;
      }

      .btn {
        text-decoration: none;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        width: 190px;
        height: 190px;
        border-radius: 40px;
        color: white;
        border: 8px solid white;
        box-shadow: 0 12px 0 rgba(0, 0, 0, 0.1);
        transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        position: relative;
        cursor: pointer;
      }

      .btn .icon {
        font-size: 3.5rem;
        margin-bottom: 5px;
        transition: transform 0.3s ease;
      }

      .btn .text {
        font-size: 2rem;
        font-weight: 800;
        letter-spacing: 1px;
      }

      .btn small {
        font-size: 1rem;
        background: rgba(0, 0, 0, 0.1);
        padding: 2px 10px;
        border-radius: 20px;
        margin-top: 5px;
      }

      /* Warna Level Terupdate */
      .easy {
        background: var(--easy-color);
      }
      .medium {
        background: var(--medium-color);
      }
      .hard {
        background: var(--hard-color);
      }

      /* Efek Interaksi */
      .btn:hover {
        transform: scale(1.1) rotate(2deg);
        box-shadow: 0 6px 0 rgba(0, 0, 0, 0.1);
        filter: brightness(1.05);
      }

      .btn:hover .icon {
        transform: scale(1.2) rotate(-10deg);
      }

      .btn:active {
        transform: scale(0.95);
        box-shadow: 0 0px 0 rgba(0, 0, 0, 0.1);
      }

      /* ============================================================
           4. DEKORASI & ANIMASI
           ============================================================ */
      .flower {
        position: absolute;
        font-size: 2.5rem;
        opacity: 0.5;
        z-index: 1;
        pointer-events: none;
        animation: rotateFlow 15s linear infinite;
      }

      .f1 {
        top: 10%;
        left: 10%;
        color: #fff;
      }
      .f2 {
        bottom: 10%;
        right: 10%;
        color: var(--medium-color); /* Menyesuaikan warna teal */
        animation-delay: -2s;
      }
      .f3 {
        top: 50%;
        left: 5%;
        color: var(--hard-color); /* Menyesuaikan warna periwinkle */
        animation-delay: -5s;
      }

      @keyframes float {
        0%,
        100% {
          transform: translateY(0);
        }
        50% {
          transform: translateY(-15px);
        }
      }

      @keyframes bounceIn {
        0% {
          transform: scale(0.3);
          opacity: 0;
        }
        50% {
          transform: scale(1.05);
          opacity: 1;
        }
        70% {
          transform: scale(0.9);
        }
        100% {
          transform: scale(1);
        }
      }

      @keyframes rotateFlow {
        from {
          transform: rotate(0deg) translate(0, 0);
        }
        to {
          transform: rotate(360deg) translate(30px, 50px);
        }
      }

      /* Responsif untuk Tablet/HP */
      @media (max-width: 768px) {
        .main-title {
          font-size: 3rem;
        }
        .sub-title {
          font-size: 1.2rem;
        }
        .btn {
          width: 150px;
          height: 150px;
        }
        .btn .text {
          font-size: 1.5rem;
        }
        .btn .icon {
          font-size: 2.5rem;
        }
      }
    </style>
  </head>
  <body>
    <div class="flower f1">🌸</div>
    <div class="flower f2">🌺</div>
    <div class="flower f3">🌸</div>

    <div class="landing-container">
      <header class="header-section">
        <h1 class="main-title">Kartini Day</h1>
        <p class="sub-title">Indonesian Women’s Hero</p>
        <span style="font-size: 14pt"
          >Let's celebarate it by playing these games 🎮</span
        >
      </header>

      <nav class="button-group">
        <a href="kinder/index.html" class="btn easy">
          <span class="icon">🌱</span>
          <span class="text">EASY</span>
          <small>Karini Bud</small>
        </a>

        <a href="junior/index.html" class="btn medium">
          <span class="icon">🕯️</span>
          <span class="text">MEDIUM</span>
          <small>Kartini Light</small>
        </a>

        <a href="coder/index.html" class="btn hard">
          <span class="icon">✨</span>
          <span class="text">HARD</span>
          <small>Kartini Radiance</small>
        </a>
      </nav>
    </div>
  </body>
</html>
